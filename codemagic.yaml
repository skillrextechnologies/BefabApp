workflows:
  ios-workflow:
    name: iOS Build and Deploy
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_CONNECT_KEY_IDENTIFIER: 6Z3LGS7MW7   # your Key ID
        APP_STORE_CONNECT_ISSUER_ID: d8183cba-9d7d-4d93-8172-cb155320eb7f # your Issuer ID
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(p8 file here if using env var)
    scripts:
      - name: Install dependencies
        script: |
          flutter clean
          flutter pub get
      -- name: iOS Pod setup
  script: |
    cd ios
    rm -rf Podfile.lock Pods
    pod deintegrate
    pod repo update
    pod install --repo-update
    cd ..

      - name: Build iOS
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip
      - build/ios/ipa/*.app

    publishing:
      app_store_connect:
